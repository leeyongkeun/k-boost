<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="body" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8dde8"/>
    </linearGradient>
    <linearGradient id="nose" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e8254d"/>
      <stop offset="100%" stop-color="#C50337"/>
    </linearGradient>
    <linearGradient id="fin" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C50337"/>
      <stop offset="100%" stop-color="#8a0226"/>
    </linearGradient>
    <radialGradient id="window" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#bfe0ff"/>
      <stop offset="60%" stop-color="#4a9be0"/>
      <stop offset="100%" stop-color="#1e4e82"/>
    </radialGradient>
    <linearGradient id="flame" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff3a8"/>
      <stop offset="45%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#C50337" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Flame -->
  <path d="M88 158 Q100 200 112 158 Q108 176 100 182 Q92 176 88 158 Z" fill="url(#flame)" opacity="0.95"/>
  <path d="M93 158 Q100 186 107 158 Q104 170 100 174 Q96 170 93 158 Z" fill="#fff6c9"/>

  <!-- Left fin -->
  <path d="M62 120 L80 130 L80 160 L62 150 Z" fill="url(#fin)"/>
  <!-- Right fin -->
  <path d="M138 120 L120 130 L120 160 L138 150 Z" fill="url(#fin)"/>

  <!-- Body -->
  <path d="M80 70 Q80 50 100 20 Q120 50 120 70 L120 155 Q110 162 100 162 Q90 162 80 155 Z" fill="url(#body)" stroke="#9aa3b8" stroke-width="1.5"/>

  <!-- Nose cone accent -->
  <path d="M80 70 Q80 50 100 20 Q120 50 120 70 Z" fill="url(#nose)"/>

  <!-- Body band -->
  <rect x="80" y="130" width="40" height="6" fill="#C50337"/>

  <!-- Window -->
  <circle cx="100" cy="92" r="14" fill="url(#window)" stroke="#8a99b5" stroke-width="2"/>
  <circle cx="96" cy="88" r="4" fill="#ffffff" opacity="0.7"/>
</svg>
